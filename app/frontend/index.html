<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireDash</title>
    <style>
        :root {
            --bg-0: #0b0616;
            --bg-1: #140b29;
            --bg-2: #1d1038;
            --card: rgba(33, 20, 62, 0.72);
            --card-border: rgba(174, 122, 255, 0.28);
            --text-main: #f3eaff;
            --text-muted: #b8a2de;
            --accent: #b06dff;
            --accent-2: #6f8bff;
            --success: #43d9a3;
            --danger: #ff6f91;
            --shadow: 0 16px 48px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(1400px 700px at 100% -10%, rgba(145, 82, 255, 0.22), transparent 55%),
                radial-gradient(1000px 600px at -20% 0%, rgba(89, 115, 255, 0.2), transparent 60%),
                linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 46%, var(--bg-2) 100%);
            padding: 28px;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero {
            padding: 20px 22px;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(102, 53, 183, 0.34), rgba(44, 22, 88, 0.46));
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            margin-bottom: 18px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(1.4rem, 2.6vw, 2rem);
            letter-spacing: 0.2px;
        }

        .hero p {
            margin: 8px 0 0;
            color: var(--text-muted);
            font-size: 0.96rem;
        }

        #devices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }

        .device {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .device:hover {
            transform: translateY(-2px);
            border-color: rgba(191, 145, 255, 0.6);
        }

        .device p {
            margin: 0.32rem 0;
            color: #e9dcff;
        }

        .label {
            color: var(--text-muted);
            font-weight: 600;
            margin-right: 6px;
        }

        .actions {
            margin-top: 0.95rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid rgba(198, 168, 255, 0.3);
            border-radius: 10px;
            padding: 0.45rem 0.72rem;
            color: var(--text-main);
            cursor: pointer;
            background: linear-gradient(180deg, rgba(146, 96, 229, 0.33), rgba(87, 46, 150, 0.33));
            transition: transform 0.15s ease, filter 0.15s ease, border-color 0.15s ease;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            border-color: rgba(223, 197, 255, 0.62);
        }

        button[data-command="shutdown"] {
            background: linear-gradient(180deg, rgba(188, 67, 123, 0.45), rgba(118, 28, 68, 0.45));
            border-color: rgba(255, 149, 186, 0.38);
        }

        .stream-container {
            margin-top: 0.9rem;
            display: none;
        }

        .stream-container img {
            width: 100%;
            max-width: 900px;
            border: 1px solid rgba(212, 187, 255, 0.24);
            border-radius: 12px;
            background: #0f0b1b;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
        }

        .online {
            color: var(--success);
        }

        .offline {
            color: var(--danger);
        }
        .actions {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        button {
            border: 1px solid #c7c7c7;
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            cursor: pointer;
            background: #fff;
        }
        .stream-container {
            margin-top: 0.8rem;
            display: none;
        }
        .stream-container img {
            width: 100%;
            max-width: 900px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #111;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>🔥 FireDash Control Center</h1>
            <p>Мониторинг устройств, удалённые команды и live‑эфир экрана в тёмно‑фиолетовом интерфейсе.</p>
        </div>

        <div id="devices"></div>
    </div>

    <script>
        const cards = new Map();

        async function runCommand(deviceName, command) {
            const response = await fetch(`/api/site/devices/${encodeURIComponent(deviceName)}/commands`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({command})
            });

            if (!response.ok) {
                alert(`Ошибка отправки команды '${command}'`);
                return;
            }

            await loadDevices();
        }
        function updateCardFields(card, device, latestCommand) {
            const statusClass = device.is_online ? 'online' : 'offline';
            const statusText = device.is_online ? '🟢 Онлайн' : '🔴 Офлайн';
            card.querySelector('[data-field="status"]').innerHTML = `<span class="${statusClass}">${statusText}</span>`;
            card.querySelector('[data-field="uptime"]').textContent = device.uptime;
            card.querySelector('[data-field="cpu"]').textContent = `${device.cpu}%`;
            card.querySelector('[data-field="gpu"]').textContent = `${device.gpu}%`;
            card.querySelector('[data-field="battery"]').textContent = `${device.battery}%`;
            card.querySelector('[data-field="processes"]').textContent = device.top_processes.join(', ');
            card.querySelector('[data-field="timestamp"]').textContent = new Date(device.timestamp).toLocaleString();
            card.querySelector('[data-field="last-command"]').textContent = latestCommand ? `${latestCommand.name} (${latestCommand.status})` : 'нет';
            card.querySelector('[data-field="result"]').textContent = latestCommand && latestCommand.output ? latestCommand.output : 'ожидание команды';
        }

        function toggleStream(deviceName) {
            const card = cards.get(deviceName);
            if (!card) return;

            const block = card.querySelector('.stream-container');
            const isOpen = block.style.display === "block";

            if (isOpen) {
                block.style.display = "none";
                block.innerHTML = "";
                return;
            }

            const img = document.createElement("img");
            img.alt = `Эфир экрана ${deviceName}`;
            img.src = `/api/site/devices/${encodeURIComponent(deviceName)}/stream`;
            block.appendChild(img);
            block.style.display = "block";
        }

        function createCard(deviceName) {
            const div = document.createElement("div");
            div.className = "device";
            div.dataset.deviceName = deviceName;

            div.innerHTML = `
                <p><span class="label">Имя:</span> <span data-field="name"></span></p>
                <p><span class="label">Статус:</span> <span data-field="status"></span></p>
                <p><span class="label">Аптайм:</span> <span data-field="uptime"></span></p>
                <p><span class="label">CPU:</span> <span data-field="cpu"></span></p>
                <p><span class="label">GPU:</span> <span data-field="gpu"></span></p>
                <p><span class="label">Батарея:</span> <span data-field="battery"></span></p>
                <p><span class="label">Процессы:</span> <span data-field="processes"></span></p>
                <p><span class="label">Последний лог:</span> <span data-field="timestamp"></span></p>
                <p><span class="label">Последняя команда:</span> <span data-field="last-command"></span></p>
                <p><span class="label">Результат:</span> <span data-field="result"></span></p>
                <div class="actions">
                    <button data-command="lock_screen">🔒 Заблокировать</button>
                    <button data-command="sleep">🌙 Сон</button>
                    <button data-command="reboot">🔄 Перезагрузить</button>
                    <button data-command="shutdown">⏻ Выключить</button>
                    <button data-stream-toggle="1">📺 Эфир экрана (15 FPS)</button>
                </div>
                <div class="stream-container"></div>
            `;

            div.querySelector('[data-field="name"]').textContent = deviceName;

            div.querySelectorAll("button[data-command]").forEach(btn => {
                btn.addEventListener("click", () => runCommand(deviceName, btn.dataset.command));
            });
            div.querySelector("button[data-stream-toggle]").addEventListener("click", () => toggleStream(deviceName));
            return div;
        }

        async function loadDevices() {
            const response = await fetch("/api/site/devices");
            const devices = await response.json();
            const container = document.getElementById("devices");
            const seen = new Set();

            for (const device of devices) {
                const name = device.device_name;
                seen.add(name);

                let card = cards.get(name);
                if (!card) {
                    card = createCard(name);
                    cards.set(name, card);
                    container.appendChild(card);
                }

                updateCardFields(card, device, device.latest_command);
            }

            for (const [name, card] of cards.entries()) {
                if (!seen.has(name)) {
                    card.remove();
                    cards.delete(name);
                }
            }
        }

        loadDevices();
        setInterval(loadDevices, 5000);
    </script>
</body>
</html>
